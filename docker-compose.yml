version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arvya-backend
    ports:
      - "5101:5000"
    environment:
      PORT: 5000
      API_KEY: ${API_KEY}
      OPENAI_URL: ${OPENAI_URL}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arvya-frontend
    ports:
      - "3101:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:5000/api
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
